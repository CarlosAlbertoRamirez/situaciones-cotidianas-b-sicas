<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Situaciones Cotidianas | Your Mexican Friend</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#25d9ff;--magenta:#ff2bbf;--magenta2:#ff4fd8;
  --bg1:#070019;--bg2:#160033;--text:#f0f0ff;--muted:#a8abce;--muted2:#5a5d8a;
  --good:#22c55e;--bad:#ef4444;--warn:#f59e0b;
  --rest:#f97316;--rest2:#fdba74;--restbg:rgba(249,115,22,.1);--restbd:rgba(249,115,22,.3);
  --shop:#34d399;--shop2:#6ee7b7;--shopbg:rgba(52,211,153,.1);--shopbd:rgba(52,211,153,.3);
  --str:#60a5fa;--str2:#93c5fd;--strbg:rgba(96,165,250,.1);--strbd:rgba(96,165,250,.3);
  --font:'DM Sans',system-ui,sans-serif;--display:'Syne',system-ui,sans-serif;
  --shadow:0 20px 40px rgba(0,0,0,.4),0 0 28px rgba(255,43,191,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:radial-gradient(ellipse at 10% 8%,rgba(249,115,22,.12),transparent 30%),radial-gradient(ellipse at 90% 10%,rgba(96,165,250,.1),transparent 30%),linear-gradient(155deg,var(--bg1),var(--bg2));color:var(--text);min-height:100vh}
.app{width:min(1020px,96%);margin:14px auto 40px;display:flex;flex-direction:column;gap:12px}
.hero{border-radius:22px;padding:22px 26px;background:linear-gradient(130deg,#0a0022,#1c0050 55%,#0c002e);border:1px solid rgba(255,255,255,.09);box-shadow:var(--shadow);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:38px 38px;pointer-events:none}
.hero-in{position:relative;z-index:1;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.logo-box{width:64px;height:64px;flex-shrink:0;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,#0c0030,#280060);border:2px solid rgba(37,217,255,.28);font-family:var(--display);font-size:.9rem;font-weight:900;color:var(--magenta)}
.hero-text h1{font-family:var(--display);font-size:clamp(1.2rem,2.4vw,2rem);font-weight:900;background:linear-gradient(90deg,var(--rest),#fff 45%,var(--str));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-text p{color:var(--muted);font-size:.85rem;margin-top:4px;line-height:1.5}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.badge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:999px;padding:3px 10px;font-size:.7rem;font-weight:700;color:var(--muted)}
.ex-tabs{display:flex;gap:4px;background:linear-gradient(180deg,rgba(18,4,42,.97),rgba(24,10,52,.97));border:1px solid rgba(37,217,255,.13);border-radius:18px;padding:7px;overflow-x:auto;scrollbar-width:none}
.ex-tabs::-webkit-scrollbar{display:none}
.etab{flex-shrink:0;border:0;border-radius:11px;padding:7px 11px;font-weight:800;font-family:var(--font);font-size:.72rem;cursor:pointer;transition:.16s;color:var(--muted2);background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:60px}
.etab:hover{background:rgba(255,255,255,.07);color:var(--text)}
.etab.active{background:linear-gradient(135deg,var(--magenta),var(--magenta2));color:white;transform:translateY(-1px)}
.etab-icon{font-size:1.2rem;line-height:1}
.etab-label{font-size:.59rem;text-align:center;line-height:1.2;opacity:.9}
.panel{background:linear-gradient(180deg,rgba(18,4,42,.97),rgba(24,10,52,.97));border:1px solid rgba(37,217,255,.13);border-radius:20px;padding:22px 26px;box-shadow:var(--shadow)}
.ex-title{font-family:var(--display);font-size:1.15rem;font-weight:900;margin-bottom:6px}
.ex-instr{font-size:.85rem;color:var(--muted);line-height:1.6;padding:9px 14px;background:rgba(37,217,255,.07);border-left:3px solid var(--cyan);border-radius:0 10px 10px 0;margin-bottom:18px}
.ex-instr em{color:var(--cyan);font-style:normal;font-weight:700}
/* PHRASE CARDS */
.sit-section{margin-bottom:28px}
.sit-h{font-family:var(--display);font-size:1rem;font-weight:900;padding:8px 16px;border-radius:12px;display:inline-flex;align-items:center;gap:8px;margin-bottom:14px}
.phrase-grid{display:flex;flex-direction:column;gap:8px}
.phrase-card{border-radius:14px;padding:14px 18px;border:1.5px solid;display:flex;align-items:center;gap:12px;flex-wrap:wrap;transition:.14s}
.phrase-card:hover{transform:translateX(3px)}
.phrase-es{font-family:var(--display);font-size:1rem;font-weight:900;flex:1;min-width:180px}
.phrase-en{font-size:.84rem;color:var(--muted);flex:1;min-width:160px;font-style:italic}
.phrase-note{font-size:.72rem;color:var(--muted2);width:100%;padding-top:4px;line-height:1.5;border-top:1px solid rgba(255,255,255,.06);margin-top:4px}
.btn-audio{background:rgba(37,217,255,.12);border:1.5px solid rgba(37,217,255,.28);color:var(--cyan);border-radius:8px;padding:5px 11px;font-size:.74rem;font-weight:800;cursor:pointer;transition:.13s;font-family:var(--font);display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
.btn-audio:hover{background:rgba(37,217,255,.22)}.btn-audio.playing{animation:ablink .8s infinite}
@keyframes ablink{0%,100%{opacity:1}50%{opacity:.5}}
/* DIALOGUE */
.dial-scene{font-size:.76rem;color:var(--muted2);font-style:italic;padding:8px 14px;background:rgba(255,255,255,.03);border-radius:9px;margin-bottom:10px;border-left:3px solid rgba(255,255,255,.08)}
.chat-body{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.chat-row{display:flex;align-items:flex-end;gap:8px}
.chat-row.right{flex-direction:row-reverse}
.chat-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:rgba(255,255,255,.07)}
.chat-bub{max-width:80%;padding:10px 14px;border-radius:17px;font-size:.92rem;line-height:1.55}
.chat-row.left .chat-bub{background:rgba(255,255,255,.09);border-radius:4px 17px 17px 17px}
.chat-row.right .chat-bub{background:rgba(52,211,153,.16);border:1px solid rgba(52,211,153,.22);border-radius:17px 4px 17px 17px}
.chat-who{font-size:.6rem;font-weight:900;text-transform:uppercase;color:var(--muted2);margin-bottom:3px}
.chat-en{font-size:.74rem;color:var(--muted2);font-style:italic;margin-top:3px}
.chat-audio{background:none;border:0;cursor:pointer;font-size:.9rem;padding:2px 4px;border-radius:5px;opacity:.55;transition:.13s;vertical-align:middle}
.chat-audio:hover{opacity:1;background:rgba(255,255,255,.1)}
/* SCORE BAR */
.score-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sc{background:rgba(255,255,255,.05);border:1px solid rgba(37,217,255,.12);border-radius:11px;padding:6px 12px;display:flex;flex-direction:column;align-items:center}
.sc .l{font-size:.56rem;font-weight:800;text-transform:uppercase;color:var(--muted2)}
.sc .v{font-family:var(--display);font-size:1.1rem;font-weight:800;color:var(--cyan)}
.sc .v.g{color:var(--good)}.sc .v.b{color:var(--bad)}
.prog-w{flex:1;min-width:90px}
.prog-l{font-size:.65rem;color:var(--muted2);font-weight:700;margin-bottom:3px}
.prog-t{height:5px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.prog-f{height:100%;border-radius:999px;transition:width .35s;background:linear-gradient(90deg,var(--rest),var(--str))}
/* MC */
.mc-list{display:flex;flex-direction:column;gap:10px}
.mc-card{background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 16px}
.mc-card.ok{border-color:var(--good);background:rgba(34,197,94,.04)}
.mc-card.err{border-color:var(--bad);background:rgba(239,68,68,.04)}
.mc-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.mc-num{font-size:.62rem;font-weight:900;background:rgba(255,255,255,.07);border-radius:6px;padding:3px 8px;flex-shrink:0;margin-top:2px}
.mc-q{font-size:.98rem;line-height:1.65;flex:1}
.mc-en{font-size:.78rem;color:var(--muted2);font-style:italic;margin-bottom:10px;padding-left:28px}
.mc-sit{font-size:.68rem;font-weight:800;border-radius:6px;padding:2px 8px;display:inline-block;margin-bottom:6px;margin-left:28px}
.mc-opts{display:flex;flex-wrap:wrap;gap:7px;padding-left:28px}
.mc-opt{border:0;border-radius:10px;padding:8px 15px;font-weight:700;font-family:var(--font);font-size:.9rem;cursor:pointer;transition:.14s;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);color:var(--text)}
.mc-opt:hover:not([disabled]){transform:translateY(-1px);border-color:rgba(37,217,255,.35)}
.mc-opt[disabled]{cursor:default;transform:none}
.mc-opt.ok{border-color:var(--good);background:rgba(34,197,94,.14);color:#86efac}
.mc-opt.err{border-color:var(--bad);background:rgba(239,68,68,.12);color:#fca5a5}
.mc-opt.show{border-color:var(--good);background:rgba(34,197,94,.1);color:#86efac}
.mc-exp{display:none;font-size:.79rem;color:var(--muted);line-height:1.6;margin-top:7px;padding:7px 12px 7px 28px;background:rgba(255,255,255,.04);border-radius:8px}
.mc-exp.show{display:block}
/* FILL-IN */
.fill-list{display:flex;flex-direction:column;gap:12px}
.fill-card{background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:14px;padding:15px 17px}
.fill-card.ok{border-color:var(--good);background:rgba(34,197,94,.04)}
.fill-card.err{border-color:var(--bad);background:rgba(239,68,68,.04)}
.fill-ctx{font-size:.72rem;color:var(--muted2);font-style:italic;margin-bottom:6px}
.fill-q{font-size:1rem;line-height:1.85;font-weight:600;margin-bottom:4px}
.fill-en{font-size:.76rem;color:var(--muted2);font-style:italic;margin-bottom:10px}
.fill-blank{display:inline-block;border-bottom:2.5px solid var(--cyan);min-width:100px;text-align:center;padding:0 4px;color:var(--cyan);font-weight:800;font-family:var(--display);font-size:1rem}
.fill-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px}
.fill-chip{border:0;border-radius:9px;padding:7px 14px;font-weight:700;font-family:var(--display);font-size:.9rem;cursor:pointer;transition:.13s;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);color:var(--text)}
.fill-chip:hover:not([disabled]):not(.used){transform:translateY(-2px);border-color:rgba(37,217,255,.4)}
.fill-chip.used{opacity:.22;cursor:not-allowed}
.fill-chip.chip-ok{border-color:var(--good);background:rgba(34,197,94,.18);color:#86efac}
.fill-chip.chip-err{border-color:var(--bad);background:rgba(239,68,68,.15);color:#fca5a5}
.fill-exp{display:none;font-size:.8rem;color:var(--muted);margin-top:6px;padding:7px 10px;background:rgba(255,255,255,.04);border-radius:8px;line-height:1.55}
.fill-exp.show{display:block}
/* CHAT BUILD */
.build-card{background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:16px;padding:18px;margin-bottom:14px}
.build-card.ok{border-color:var(--good);background:rgba(34,197,94,.04)}
.build-card.err{border-color:var(--bad);background:rgba(239,68,68,.04)}
.build-ctx{font-size:.74rem;color:var(--muted2);font-style:italic;margin-bottom:10px;padding:7px 12px;background:rgba(255,255,255,.04);border-radius:8px}
.build-drop{min-height:52px;background:rgba(37,217,255,.04);border:1.5px dashed rgba(37,217,255,.22);border-radius:11px;padding:10px;display:flex;flex-direction:column;gap:7px;margin-bottom:10px;transition:.15s}
.build-drop.drag-over{border-color:var(--cyan);background:rgba(37,217,255,.1)}
.build-pile{display:flex;flex-wrap:wrap;gap:7px;padding:10px;background:rgba(255,255,255,.03);border-radius:11px;margin-bottom:10px;min-height:46px}
.build-chip{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.14);border-radius:9px;padding:8px 14px;font-size:.88rem;font-weight:600;cursor:grab;user-select:none;transition:.13s}
.build-chip:hover{transform:translateY(-2px);border-color:rgba(37,217,255,.4)}
.build-chip.ghost{opacity:.3}
.build-chip.b-ok{background:rgba(34,197,94,.14);border-color:var(--good);color:#86efac;cursor:default}
.build-chip.b-err{background:rgba(239,68,68,.1);border-color:var(--bad);color:#fca5a5;font-size:.78rem}
.build-placed{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 13px;font-size:.88rem;cursor:pointer;transition:.12s}
.build-placed:hover{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.07)}
.build-exp{display:none;font-size:.8rem;color:var(--muted);line-height:1.55;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:8px}
.build-exp.show{display:block}
/* SPEED */
.sp-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.sp-stats{display:flex;gap:9px}
.spst{background:rgba(255,255,255,.05);border:1px solid rgba(37,217,255,.12);border-radius:11px;padding:7px 14px;text-align:center}
.spst .sl{font-size:.56rem;font-weight:800;text-transform:uppercase;color:var(--muted2)}
.spst .sv{font-family:var(--display);font-size:1.2rem;font-weight:900;color:var(--cyan)}
.spst .sv.g{color:var(--good)}.spst .sv.b{color:var(--bad)}.spst .sv.w{color:var(--warn)}
.sp-card{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);border-radius:18px;padding:22px;text-align:center;width:100%;max-width:540px}
.sp-sit{font-size:.7rem;font-weight:900;border-radius:999px;padding:4px 12px;display:inline-block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.sp-q{font-size:1rem;line-height:1.65;margin-bottom:4px}
.sp-en{font-size:.82rem;color:var(--muted2);font-style:italic}
.sp-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:540px}
.sp-opt{border:0;border-radius:12px;padding:11px 14px;font-weight:700;font-family:var(--font);font-size:.9rem;cursor:pointer;transition:.13s;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);color:var(--text);text-align:left}
.sp-opt:hover:not([disabled]){transform:translateY(-2px);border-color:rgba(37,217,255,.4)}
.sp-opt[disabled]{cursor:default;transform:none}
.sp-opt.sp-ok{border-color:var(--good);background:rgba(34,197,94,.18);color:#86efac}
.sp-opt.sp-err{border-color:var(--bad);background:rgba(239,68,68,.14);color:#fca5a5}
.sp-opt.sp-show{border-color:var(--good);background:rgba(34,197,94,.1);color:#86efac}
.sp-fb{min-height:38px;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:600;border-radius:9px;padding:0 14px;width:100%;max-width:540px}
.sp-fb.ok{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:#86efac}
.sp-fb.err{background:rgba(239,68,68,.11);border:1px solid rgba(239,68,68,.22);color:#fca5a5}
.sp-start{text-align:center;padding:16px 0;display:flex;flex-direction:column;align-items:center;gap:12px}
.sp-start h2{font-family:var(--display);font-size:1.4rem;font-weight:900}
.streak{background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.3);border-radius:999px;padding:4px 12px;font-size:.74rem;font-weight:800;color:#fcd34d;display:none}
.streak.on{display:inline-flex;align-items:center;gap:4px}
.cf{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--display);font-size:2rem;font-weight:900;color:var(--warn);pointer-events:none;opacity:0;z-index:999}
.cf.pop{animation:cfk .7s ease forwards}
@keyframes cfk{0%{opacity:1;transform:translate(-50%,-60%) scale(.8)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-40%) scale(1)}}
/* REF */
.ref-search{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(37,217,255,.25);color:var(--text);border-radius:11px;padding:10px 16px;font-family:var(--font);font-size:.95rem;outline:none;transition:.15s;margin-bottom:12px}
.ref-search:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(37,217,255,.1)}
.ref-search::placeholder{color:var(--muted2)}
.ref-row{display:flex;gap:10px;align-items:center;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap;transition:.12s}
.ref-row:hover{background:rgba(255,255,255,.03)}
.rr-es{font-family:var(--display);font-weight:900;font-size:.95rem;min-width:200px;cursor:pointer}
.rr-en{font-style:italic;color:var(--muted2);font-size:.82rem;flex:1}
.rr-ctx{font-size:.68rem;color:var(--muted2);border-radius:6px;padding:2px 7px;border:1px solid rgba(255,255,255,.08);flex-shrink:0}
.hl{background:rgba(37,217,255,.2);border-radius:3px;padding:0 2px}
.fb{display:none;margin-top:12px;padding:10px 15px;border-radius:10px;font-size:.88rem;line-height:1.6}
.fb.show{display:block}
.fb.ok{background:rgba(34,197,94,.12);border-left:4px solid var(--good);color:#bbf7d0;border-radius:0 11px 11px 0}
.fb.partial{background:rgba(245,158,11,.1);border-left:4px solid var(--warn);color:#fde68a;border-radius:0 11px 11px 0}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.btn{border:0;border-radius:11px;padding:9px 18px;font-weight:800;font-family:var(--font);font-size:.83rem;cursor:pointer;transition:.15s}
.btn:hover{transform:translateY(-2px)}.btn:active{transform:translateY(0)}.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),#00bfff);color:#07111f}
.btn-ghost{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(37,217,255,.18)}
.creator{text-align:center;color:#4a4d78;font-size:.76rem;font-weight:700;margin-top:2px}
.creator span{color:var(--magenta2)}
@media(max-width:600px){.panel{padding:14px 12px}.sp-opts{grid-template-columns:1fr}.phrase-es,.phrase-en{min-width:100%}}
</style>
</head>
<body>
<div class="app">
<div class="cf" id="cf"></div>
<header class="hero">
  <div class="hero-in">
    <div class="logo-box">YMF</div>
    <div class="hero-text">
      <h1>Situaciones Cotidianas 🇲🇽</h1>
      <p>Survival Spanish for real life in Mexico — restaurants, supermarkets, and getting around the city. Essential phrases + interactive exercises.</p>
      <div class="badges">
        <span class="badge">🆕 A1–A2</span>
        <span class="badge" style="border-color:var(--restbd);color:var(--rest2)">🍽️ Restaurante</span>
        <span class="badge" style="border-color:var(--shopbd);color:var(--shop2)">🛒 Supermercado</span>
        <span class="badge" style="border-color:var(--strbd);color:var(--str2)">🗺️ Calle</span>
        <span class="badge" style="border-color:rgba(37,217,255,.4);color:var(--cyan)">🔊 Audio</span>
        <span class="badge">By Carlos &amp; Denisse</span>
      </div>
    </div>
  </div>
</header>
<div class="ex-tabs">
  <button class="etab active" id="etab-0" onclick="goEx(0)"><span class="etab-icon">📖</span><span class="etab-label">Frases<br>útiles</span></button>
  <button class="etab" id="etab-1" onclick="goEx(1)"><span class="etab-icon">💬</span><span class="etab-label">Diá-<br>logos</span></button>
  <button class="etab" id="etab-2" onclick="goEx(2)"><span class="etab-icon">📝</span><span class="etab-label">¿Qué<br>dices?</span></button>
  <button class="etab" id="etab-3" onclick="goEx(3)"><span class="etab-icon">✏️</span><span class="etab-label">Com-<br>pleta</span></button>
  <button class="etab" id="etab-4" onclick="goEx(4)"><span class="etab-icon">🔤</span><span class="etab-label">Ordena<br>el diálogo</span></button>
  <button class="etab" id="etab-5" onclick="goEx(5)"><span class="etab-icon">⚡</span><span class="etab-label">Speed<br>round</span></button>
  <button class="etab" id="etab-6" onclick="goEx(6)"><span class="etab-icon">📄</span><span class="etab-label">Refer-<br>encia</span></button>

function renderPhrases(){

  const sections=Object.entries(grouped).map(([sit,phrases])=>{

      <div class="phrase-es" style="color:${s.col2}">${p.es}</div>
      <div class="phrase-en">${p.en}</div>
      <button class="btn-audio" onclick="speak('${p.es.replace(/'/g,"\\'")}',this)">🔊</button>
      ${p.note?`<div class="phrase-note">💡 ${p.note}</div>`:''}
    </div>`).join('');
    return `<div class="sit-section">
      <div class="sit-h" style="background:${s.bg};color:${s.col2};border:1.5px solid ${s.bd}">${s.label} — ${phrases.length} frases</div>
      <div class="phrase-grid">${cards}</div>
    </div>`;
  }).join('');
  document.getElementById('exContainer').innerHTML=`<div class="panel">
  <div class="ex-title">📖 Frases útiles — ${PHRASES.length} expressions</div>
  <div class="ex-instr">Essential phrases for 3 real situations in Mexico. Click <em>🔊</em> to hear any phrase. Study these before the exercises!</div>
  ${sections}</div>`;
}

let dialAns={};
function renderDial(){
  dialAns={};
  const tot=DIALS.length;
  const html=DIALS.map((d,i)=>{
    const s=SITS[d.sit];
    const msgs=d.chat.map(m=>`<div class="chat-row ${m.side}">
      <div class="chat-av">${m.av}</div>
      <div>
        <div class="chat-who">${m.who}</div>
        <div class="chat-bub">
          ${m.es}
          <button class="chat-audio" onclick="speak('${m.es.replace(/'/g,"\\'")}',this)" title="🔊">🔊</button>
          <div class="chat-en">${m.en}</div>
        </div>
      </div>
    </div>`).join('');
    const opts=d.opts.map((o,oi)=>`<button class="dial-opt" id="do${i}_${oi}" onclick="answerDial(${i},${oi})" style="border-color:rgba(255,255,255,.1)">${o}</button>`).join('');
    return `<div style="background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;margin-bottom:16px" id="dc${i}">
      <div class="dial-scene"><span style="background:${s.bg};color:${s.col2};border-radius:5px;padding:2px 8px;font-size:.7rem;font-weight:800">${s.label}</span> ${d.title}</div>
      <div class="chat-body" style="padding:14px 16px">${msgs}</div>
      <div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.12)">
        <div style="font-size:.87rem;font-weight:700;color:var(--muted);margin-bottom:10px">👉 ${d.q}</div>
        <div style="display:flex;flex-direction:column;gap:7px">${opts}</div>
        <div class="dial-exp" id="de${i}" style="display:none;margin-top:8px;font-size:.8rem;color:var(--muted);padding:8px 12px;background:rgba(255,255,255,.04);border-radius:8px;line-height:1.55"></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('exContainer').innerHTML=`<div class="panel">
  <div class="ex-title">💬 Diálogos reales — 9 conversations</div>
  <div class="ex-instr">Read the full conversation with English translations below each line. Click 🔊 to hear any line. Then answer the question about what was said.</div>
  <div class="score-bar">
    <div class="sc"><span class="l">Total</span><span class="v">${tot}</span></div>
    <div class="sc"><span class="l">OK</span><span class="v g" id="da_ok">0</span></div>
    <div class="sc"><span class="l">Miss</span><span class="v b" id="da_err">0</span></div>
    <div class="prog-w"><div class="prog-l">Answered: <span id="da_pct">0%</span></div><div class="prog-t"><div class="prog-f" id="da_pg" style="width:0%"></div></div></div>
  </div>
  ${html}
  <div class="fb" id="da_fb"></div>
  <div class="actions"><button class="btn btn-ghost" onclick="dialAns={};renderDial()">↺ Reset</button></div></div>`;
}
function answerDial(qi,oi){
  if(dialAns[qi]!==undefined)return;
  const d=DIALS[qi];const isOk=oi===d.a;
  dialAns[qi]=isOk;
  const card=document.getElementById('dc'+qi);
  if(card){card.style.borderColor=isOk?'var(--good)':'var(--bad)';card.style.background=isOk?'rgba(34,197,94,.04)':'rgba(239,68,68,.04)';}
  d.opts.forEach((_,x)=>{const b=document.getElementById(`do${qi}_${x}`);if(!b)return;b.disabled=true;if(x===d.a)b.style.cssText='border-color:var(--good);background:rgba(34,197,94,.14);color:#86efac';else if(x===oi&&!isOk)b.style.cssText='border-color:var(--bad);background:rgba(239,68,68,.12);color:#fca5a5';});
  const e=document.getElementById('de'+qi);if(e){e.style.display='block';e.innerHTML=(isOk?'✓ ':'✗ ')+d.exp;}
  const tot=Object.keys(dialAns).length;
  const ok=Object.values(dialAns).filter(v=>v).length;
  document.getElementById('da_ok').textContent=ok;document.getElementById('da_err').textContent=tot-ok;
  document.getElementById('da_pct').textContent=Math.round(tot/DIALS.length*100)+'%';
  document.getElementById('da_pg').style.width=Math.round(tot/DIALS.length*100)+'%';
  if(tot===DIALS.length){const pct=Math.round(ok/tot*100);const fb=document.getElementById('da_fb');fb.className='fb show '+(pct>=85?'ok':'partial');fb.innerHTML=`${pct>=85?'🏆':'📖'} <strong>${ok}/${tot}.</strong> ${pct>=85?'¡Excelente! You handle real Mexican conversations!':'Review the phrases and try again.'}`;}
}

      <div class="mc-top"><span class="mc-num">${i+1}</span><span class="mc-q">${item.q}</span></div>
      <div class="mc-opts">${opts}</div>
      <div class="mc-exp${done?' show':''}" id="mce${i}">${item.x}</div>
    </div>`;
  }).join('');
  document.getElementById('exContainer').innerHTML=`<div class="panel"><div class="ex-title">📝 ¿Qué dices? — 45 situations</div>
  <div class="ex-instr">You're in Mexico. Choose the correct Spanish phrase for each situation. Think about context, not just vocabulary!</div>

  <div class="mc-list">${html}</div>
  <div class="fb" id="mc_fb"></div>
  <div class="actions"><button class="btn btn-cyan" id="mc_chk" onclick="checkMC()">Check all</button><button class="btn btn-ghost" onclick="mcAnswers={};renderMC()">↺ Reset</button></div></div>`;
}
function answerMC(qi,oi){
  if(mcAnswers[qi]!==undefined)return;
  if(mcAnswers[qi]!==undefined){const p=document.getElementById(`mco${qi}_${mcAnswers[qi]}`);if(p)p.classList.remove('ok','err','show');}
  mcAnswers[qi]=oi===MC[qi].a;
  const b=document.getElementById(`mco${qi}_${oi}`);if(b)b.classList.add(oi===MC[qi].a?'ok':'err');
  const e=document.getElementById('mce'+qi);if(e)e.classList.add('show');
  const card=document.getElementById('mcc'+qi);if(card)card.classList.add(mcAnswers[qi]?'ok':'err');
  const pct=Math.round(Object.keys(mcAnswers).length/MC.length*100);
  const el=document.getElementById('mc_p');if(el)el.textContent=pct+'%';
  const pg=document.getElementById('mc_pg');if(pg)pg.style.width=pct+'%';
}
function checkMC(){
  let ok=0;MC.forEach((item,i)=>{
    if(mcAnswers[i]===undefined)return;
    if(mcAnswers[i])ok++;
    MCO[i].forEach(oi=>{const b=document.getElementById(`mco${i}_${oi}`);if(!b)return;b.disabled=true;if(oi===item.a)b.classList.add('show');});
  });
  const tot=Object.keys(mcAnswers).length;
  const pct=Math.round(ok/MC.length*100);
  document.getElementById('mc_ok').textContent=ok;document.getElementById('mc_err').textContent=MC.length-ok;
  document.getElementById('mc_pg').style.width='100%';document.getElementById('mc_p').textContent='100%';
  const fb=document.getElementById('mc_fb');fb.className='fb show '+(pct>=80?'ok':'partial');
  fb.innerHTML=`${pct>=80?'🏆':'📖'} <strong>${ok}/${MC.length}.</strong> ${pct>=80?'¡Excelente! You know what to say in Mexico!':'Study the phrases and try again.'}`;
}

let buildSt={};
let buildDrag=null;

function renderBuild(){
  buildSt={};BUILD.forEach((_,i)=>{buildSt[i]={placed:[],done:false,ok:false};});
  renderBuildBody();
}
function renderBuildBody(){
  const cards=BUILD.map((item,idx)=>{
    const st=buildSt[idx];const s=SITS[item.sit];
    const dropZone=`<div class="build-drop" id="bdrop${idx}"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="dropBL(event,${idx})">
      ${st.placed.length?st.placed.map(wi=>`<div class="build-placed" onclick="${!st.done?`removeBL(${idx},${wi})`:''}">${item.lines[wi]}</div>`).join(''):'<span style="font-size:.8rem;color:var(--muted2);font-style:italic;padding:4px">Click lines below to add them in order…</span>'}
    </div>`;
    const pile=item.lines.map((line,wi)=>{
      const used=st.placed.includes(wi);
      let cls='build-chip';
      if(st.done){const pos=item.answer.indexOf(wi);const actual=st.placed.indexOf(wi);cls+=(pos===actual?' b-ok':' b-err');}
      return `<div class="${cls}${used?' ghost':''}" draggable="true"
        ondragstart="buildDrag=${wi};event.dataTransfer.setData('text','${wi}')"
        onclick="${!st.done&&!used?`addBL(${idx},${wi})`:''}"
        style="${used?'pointer-events:none':''}">${line}</div>`;
    }).join('');
    return `<div class="build-card${st.done?(st.ok?' ok':' err'):''}" id="bc${idx}">
      <div class="build-ctx"><span style="background:${s.bg};color:${s.col2};border-radius:5px;padding:1px 7px;font-size:.66rem;font-weight:800">${s.label}</span> ${item.ctx}</div>
      ${dropZone}
      <div class="build-pile">${pile}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <button class="btn btn-cyan" style="padding:6px 14px;font-size:.78rem" onclick="checkBL(${idx})" ${st.placed.length===item.lines.length&&!st.done?'':'disabled'} id="bchk${idx}">Check ✓</button>
        <button class="btn btn-ghost" style="padding:6px 14px;font-size:.78rem" onclick="resetBL(${idx})">↺</button>
      </div>
      <div class="build-exp${st.done?' show':''}" id="bexp${idx}">${st.done?(st.ok?'✓ Great order!':'✗ Correct: '+item.answer.map(wi=>'"'+item.lines[wi]+'"').join(' → ')+'<br>')+item.exp:''}</div>
    </div>`;
  }).join('');
  const done=Object.values(buildSt).filter(s=>s.done).length;
  const ok=Object.values(buildSt).filter(s=>s.ok).length;
  document.getElementById('exContainer').innerHTML=`<div class="panel">
  <div class="ex-title">🔤 Ordena el diálogo</div>
  <div class="ex-instr">Click the lines in the correct conversation order. Think about who speaks first and what logically follows. Drag & drop also works on desktop.</div>
  <div class="score-bar"><div class="sc"><span class="l">Done</span><span class="v w">${done}/${BUILD.length}</span></div><div class="sc"><span class="l">OK</span><span class="v g">${ok}</span></div><div class="sc"><span class="l">Miss</span><span class="v b">${done-ok}</span></div></div>
  ${cards}
  <div class="actions"><button class="btn btn-ghost" onclick="renderBuild()">↺ Reset all</button></div></div>`;
}
function addBL(idx,wi){const st=buildSt[idx];if(st.done||st.placed.includes(wi))return;st.placed.push(wi);const btn=document.getElementById('bchk'+idx);if(btn)btn.disabled=st.placed.length!==BUILD[idx].lines.length;renderBuildBody();}
function removeBL(idx,wi){const st=buildSt[idx];if(st.done)return;st.placed=st.placed.filter(x=>x!==wi);renderBuildBody();}
function dropBL(e,idx){e.preventDefault();document.getElementById('bdrop'+idx)?.classList.remove('drag-over');const wi=parseInt(e.dataTransfer.getData('text'));if(!isNaN(wi))addBL(idx,wi);}
function resetBL(idx){buildSt[idx]={placed:[],done:false,ok:false};renderBuildBody();}
function checkBL(idx){const item=BUILD[idx];const st=buildSt[idx];st.ok=JSON.stringify(st.placed)===JSON.stringify(item.answer);st.done=true;renderBuildBody();}

function renderSpeed(){
  const arr=seededShuffle([...SP_ITEMS],42);window.__sp=arr;
  spIdx=0;spOk=0;spErr=0;spStreak=0;spAnswered2={};
  document.getElementById('exContainer').innerHTML=`<div class="panel"><div class="ex-title">⚡ Speed round</div>
  <div class="ex-instr">Read the situation in English. Choose the correct Spanish phrase. No typing — just click!</div>
  <div class="sp-wrap" id="spWrap"><div class="sp-start"><div style="font-size:2.8rem">⚡</div><h2>Situaciones rápidas</h2><p style="color:var(--muted);max-width:400px">30 real situations — restaurant, supermarket and street. Pick the right phrase fast!</p><button class="btn btn-cyan" onclick="startSpeed()">¡Empezamos!</button></div></div></div>`;
}
function startSpeed(){spIdx=0;spOk=0;spErr=0;spStreak=0;nextSp();}
function nextSp(){
  const arr=window.__sp;if(spIdx>=arr.length){endSpeed();return;}
  const item=arr[spIdx];const s=SITS[item.sit];
  const shuffled=seededShuffle([...item.opts],spIdx*17+3);
  const opts=shuffled.map(o=>`<button class="sp-opt" onclick="answerSp('${o.replace(/'/g,"\\'")}','${item.a.replace(/'/g,"\\'")}',this)">${o}</button>`).join('');
  document.getElementById('spWrap').innerHTML=`
    <div class="sp-stats"><div class="spst"><div class="sl">Q</div><div class="sv w">${spIdx+1}/${arr.length}</div></div><div class="spst"><div class="sl">OK</div><div class="sv g">${spOk}</div></div><div class="spst"><div class="sl">Miss</div><div class="sv b">${spErr}</div></div></div>
    <div class="streak${spStreak>=3?' on':''}" id="stk">🔥 x${spStreak}</div>
    <div class="sp-card">
      <div class="sp-sit" style="background:${s.bg};color:${s.col2}">${s.label}</div>
      <div class="sp-q">${item.q}</div>
    </div>
    <div class="sp-opts">${opts}</div>
    <div class="sp-fb" id="sFb" style="opacity:0"></div>`;
}
function answerSp(chosen,correct,btn){
  if(spAnswered2[spIdx])return;spAnswered2[spIdx]=true;
  const isOk=chosen===correct;
  if(isOk){spOk++;spStreak++;}else{spErr++;spStreak=0;}
  document.querySelectorAll('.sp-opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('sp-show');
    else if(b===btn&&!isOk)b.classList.add('sp-err');
  });
  const fb=document.getElementById('sFb');
  if(fb){fb.style.opacity='1';fb.className=`sp-fb ${isOk?'ok':'err'}`;fb.innerHTML=isOk?`✓ Correct!${spStreak>=3?' 🔥 x'+spStreak:''}`:`✗ "${correct}"`;}
  if(spStreak>=3){const cf=document.getElementById('cf');cf.textContent='🔥 x'+spStreak;cf.classList.remove('pop');void cf.offsetWidth;cf.classList.add('pop');}
  spIdx++;setTimeout(nextSp,isOk?800:1600);
}
function endSpeed(){
  const pct=Math.round(spOk/SP_ITEMS.length*100);
  const emo=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚';
  document.getElementById('spWrap').innerHTML=`<div class="sp-start"><div style="font-size:3rem">${emo}</div><h2>${spOk}/${SP_ITEMS.length}</h2><p style="color:var(--muted)">${pct>=90?'¡Excelente! You\'re ready for Mexico!':pct>=70?'¡Muy bien! Almost there.':pct>=50?'Good start! Review the phrases.':'Study the Frases útiles tab first.'}</p><button class="btn btn-cyan" onclick="startSpeed()">↺ Play again</button></div>`;
}

/* ══════════════════════════════════
   EX 6 — REFERENCE (searchable)
══════════════════════════════════ */
function buildRefRows(q){
  const sq=normS(q||'');
  const filtered=sq.length<2?PHRASES:PHRASES.filter(p=>
    normS(p.es).includes(sq)||normS(p.en).includes(sq)||normS(SITS[p.sit]?.label||'').includes(sq)||normS(p.note||'').includes(sq)
  );
  const hl=str=>sq.length>=2?str.replace(new RegExp('('+sq.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="hl">$1</span>'):str;
  let prev='';let html='';
  filtered.forEach(p=>{
    const s=SITS[p.sit];
    if(p.sit!==prev){prev=p.sit;html+=`<div style="font-family:var(--display);font-size:.88rem;font-weight:900;padding:7px 12px;border-radius:9px;display:inline-flex;align-items:center;gap:6px;margin:14px 0 8px;background:${s.bg};color:${s.col2}">${s.label}</div>`;}
    html+=`<div class="ref-row">
      <div class="rr-es" style="color:${s.col2}" onclick="speak('${p.es.replace(/'/g,"\\'")}',null)">${hl(p.es)}</div>
      <div class="rr-en">${hl(p.en)}</div>
      ${p.note?`<div style="font-size:.7rem;color:var(--muted2);width:100%;padding-top:3px;border-top:1px solid rgba(255,255,255,.04)">💡 ${p.note}</div>`:''}
    </div>`;
  });
  return {count:filtered.length,html};
}
function renderRef(){
  const {count,html}=buildRefRows('');
  document.getElementById('exContainer').innerHTML=`<div class="panel">
  <div class="ex-title">📄 Referencia — ${PHRASES.length} essential phrases</div>
  <div class="ex-instr">Search in English or Spanish. Click any phrase to <em>hear it</em>. Use this as your cheat sheet before visiting Mexico!</div>
  <input class="ref-search" id="refQ" placeholder="Search… e.g. 'bill', 'kilo', 'taxi', 'directions', 'recommend'" oninput="updateRef(this.value)" autocomplete="off">
  <div style="font-size:.73rem;color:var(--muted2);font-weight:700;margin-bottom:10px" id="refCnt">Showing all ${count} phrases</div>
  <div id="refRows">${html}</div></div>`;
}
function updateRef(q){
  const {count,html}=buildRefRows(q);
  const el=document.getElementById('refRows');if(el)el.innerHTML=html;
  const ct=document.getElementById('refCnt');if(ct)ct.textContent=count<PHRASES.length?`Showing ${count} of ${PHRASES.length} phrases`:`Showing all ${count} phrases`;
}

goEx(0);
</script>
